{% load static %}
<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ resume.full_name }} - Resume</title>
    <style>
      @page { size: A4; margin: 0; }
      html, body { margin: 0; padding: 0; }
      body { font-family: "Segoe UI", Arial, sans-serif; font-size: 10pt; color: #111111; }
      .container { width: 100%; }
      .row:after { content: ""; display: table; clear: both; }
      .col-4 { float: left; width: 34%; }
      .col-8 { float: left; width: 66%; }
      .muted { color: #333333; }
      h1, h2, h3, h4, h5, h6, p { margin: 0; }
      img { max-width: 100%; }
    </style>
    {% block extra_style %}{% endblock %}
  </head>
  <body>
    <div class="container">
      {% block body %}{% endblock %}
    </div>
  </body>
</html>
